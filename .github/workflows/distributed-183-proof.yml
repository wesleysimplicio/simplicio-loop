name: distributed-183-proof

on:
  workflow_dispatch:
    inputs:
      queue_url:
        description: "Optional HTTPS queue URL override; otherwise uses vars.SIMPLICIO_DISTRIBUTED_QUEUE_URL"
        required: false
      tls_hostname:
        description: "Optional TLS hostname override; otherwise uses vars.SIMPLICIO_DISTRIBUTED_TLS_HOSTNAME"
        required: false
      tls_sha256:
        description: "Optional SHA-256 cert fingerprint override; otherwise uses vars.SIMPLICIO_DISTRIBUTED_TLS_SHA256"
        required: false

concurrency:
  group: distributed-183-proof-${{ github.ref }}-${{ github.event.inputs.queue_url || vars.SIMPLICIO_DISTRIBUTED_QUEUE_URL || 'missing-endpoint' }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight gate
    runs-on: ubuntu-latest
    outputs:
      queue_url: ${{ steps.preflight.outputs.queue_url }}
      tls_hostname: ${{ steps.preflight.outputs.tls_hostname }}
      tls_sha256: ${{ steps.preflight.outputs.tls_sha256 }}
      task_prefix: ${{ steps.preflight.outputs.task_prefix }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fail closed on missing endpoint/TLS/token
        id: preflight
        env:
          INPUT_QUEUE_URL: ${{ github.event.inputs.queue_url }}
          VAR_QUEUE_URL: ${{ vars.SIMPLICIO_DISTRIBUTED_QUEUE_URL }}
          INPUT_TLS_HOSTNAME: ${{ github.event.inputs.tls_hostname }}
          VAR_TLS_HOSTNAME: ${{ vars.SIMPLICIO_DISTRIBUTED_TLS_HOSTNAME }}
          INPUT_TLS_SHA256: ${{ github.event.inputs.tls_sha256 }}
          VAR_TLS_SHA256: ${{ vars.SIMPLICIO_DISTRIBUTED_TLS_SHA256 }}
          QUEUE_TOKEN: ${{ secrets.SIMPLICIO_REMOTE_QUEUE_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          mkdir -p .orchestrator/proof/preflight
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import socket
          import ssl
          import sys
          from pathlib import Path
          from urllib.parse import urlsplit

          queue_url = (os.environ.get("INPUT_QUEUE_URL") or os.environ.get("VAR_QUEUE_URL") or "").strip()
          tls_hostname = (os.environ.get("INPUT_TLS_HOSTNAME") or os.environ.get("VAR_TLS_HOSTNAME") or "").strip()
          tls_sha256 = ((os.environ.get("INPUT_TLS_SHA256") or os.environ.get("VAR_TLS_SHA256") or "").strip()
                        .replace(":", "").lower())
          queue_token = (os.environ.get("QUEUE_TOKEN") or "").strip()
          run_id = os.environ["RUN_ID"]
          run_attempt = os.environ["RUN_ATTEMPT"]
          out_dir = Path(".orchestrator/proof/preflight")
          out_dir.mkdir(parents=True, exist_ok=True)

          errors = []
          if not queue_url:
              errors.append("missing queue URL: provide workflow input.queue_url or vars.SIMPLICIO_DISTRIBUTED_QUEUE_URL")
          if not tls_hostname:
              errors.append("missing TLS hostname: provide workflow input.tls_hostname or vars.SIMPLICIO_DISTRIBUTED_TLS_HOSTNAME")
          if not tls_sha256:
              errors.append("missing TLS SHA-256 fingerprint: provide workflow input.tls_sha256 or vars.SIMPLICIO_DISTRIBUTED_TLS_SHA256")
          if not queue_token:
              errors.append("missing queue token secret: set secrets.SIMPLICIO_REMOTE_QUEUE_TOKEN")

          parsed = urlsplit(queue_url) if queue_url else None
          if parsed and parsed.scheme != "https":
              errors.append("queue URL must use https")
          if parsed and not parsed.hostname:
              errors.append("queue URL must include a hostname")

          measured_fingerprint = ""
          handshake = "SKIPPED"
          if not errors and parsed:
              context = ssl.create_default_context()
              port = parsed.port or 443
              with socket.create_connection((parsed.hostname, port), timeout=15) as sock:
                  with context.wrap_socket(sock, server_hostname=tls_hostname) as secure_sock:
                      cert = secure_sock.getpeercert(binary_form=True)
                      measured_fingerprint = hashlib.sha256(cert).hexdigest()
                      handshake = "OK"
          if measured_fingerprint and measured_fingerprint != tls_sha256:
              errors.append("TLS fingerprint mismatch between measured certificate and configured expectation")

          payload = {
              "schema": "simplicio.distributed-proof.preflight/v1",
              "tag": "MEASURED" if not errors else "UNVERIFIED",
              "queue_url": queue_url,
              "queue_host": parsed.hostname if parsed else "",
              "queue_port": (parsed.port or 443) if parsed else None,
              "tls_hostname": tls_hostname,
              "tls_sha256_expected": tls_sha256,
              "tls_sha256_measured": measured_fingerprint,
              "tls_handshake": handshake,
              "queue_token_present": bool(queue_token),
              "task_prefix": f"gha-183-{run_id}-{run_attempt}",
              "errors": errors,
              "physical_runner_independence": "UNVERIFIED",
              "production_firewall_policy": "UNVERIFIED",
          }
          (out_dir / "preflight.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          if errors:
              print(json.dumps(payload, ensure_ascii=False, indent=2))
              sys.exit(1)

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"queue_url={queue_url}\n")
              fh.write(f"tls_hostname={tls_hostname}\n")
              fh.write(f"tls_sha256={tls_sha256}\n")
              fh.write(f"task_prefix={payload['task_prefix']}\n")
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

      - name: Upload preflight receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: distributed-183-preflight
          path: .orchestrator/proof/preflight
          if-no-files-found: error

  codex-identity-proof:
    name: Codex identity proof
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Codex remote-queue receipt
        env:
          QUEUE_URL: ${{ needs.preflight.outputs.queue_url }}
          QUEUE_TOKEN: ${{ secrets.SIMPLICIO_REMOTE_QUEUE_TOKEN }}
          TASK_PREFIX: ${{ needs.preflight.outputs.task_prefix }}
          JOB_NAME: codex
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          mkdir -p .orchestrator/proof/codex
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from simplicio_loop.remote_queue import HTTPRemoteQueue

          job_name = os.environ["JOB_NAME"]
          queue = HTTPRemoteQueue(os.environ["QUEUE_URL"], token=os.environ["QUEUE_TOKEN"], timeout=15)
          task_id = f"{os.environ['TASK_PREFIX']}-{job_name}-identity"
          agent_id = f"{job_name}@github-actions-{os.environ['RUN_ID']}-{os.environ['RUN_ATTEMPT']}"
          identity = {
              "agent_id": agent_id,
              "runtime": job_name,
              "device_id": f"github-actions-{job_name}",
              "session_id": f"{os.environ['RUN_ID']}-{os.environ['RUN_ATTEMPT']}-{job_name}",
              "protocol": "simplicio-distributed/v1",
              "capabilities": ["claim", "heartbeat", "fencing", "receipts", "events", "evidence", "completion"],
          }
          queue.enqueue(task_id, {"source": "github-actions", "issue": 183, "job": job_name})
          lease = queue.claim(task_id, agent_id, idempotency_key=f"{task_id}:claim", ttl=45, identity=identity)
          lease = queue.heartbeat(lease, ttl=45)
          receipt_ref = f"receipts/{task_id}.json"
          completion = queue.complete(lease, receipt_ref=receipt_ref)
          task_state = queue.task(task_id)
          events = [row for row in queue.events(after=0, limit=200) if row["task_id"] == task_id]
          payload = {
              "schema": "simplicio.distributed-proof.identity-receipt/v1",
              "tag": "MEASURED",
              "issue": 183,
              "job": job_name,
              "task_id": task_id,
              "agent": identity,
              "queue_url": os.environ["QUEUE_URL"],
              "receipt_ref": receipt_ref,
              "fencing_token": lease.fencing_token,
              "task_status": task_state["status"],
              "events": events,
              "completion": completion,
              "physical_machine_status": "UNVERIFIED",
              "separate_deployment_status": "MEASURED",
          }
          out = Path(f".orchestrator/proof/{job_name}/{job_name}-identity-receipt.json")
          out.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

      - name: Upload Codex receipt
        uses: actions/upload-artifact@v4
        with:
          name: distributed-183-codex
          path: .orchestrator/proof/codex
          if-no-files-found: error

  claude-identity-proof:
    name: Claude identity proof
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Claude remote-queue receipt
        env:
          QUEUE_URL: ${{ needs.preflight.outputs.queue_url }}
          QUEUE_TOKEN: ${{ secrets.SIMPLICIO_REMOTE_QUEUE_TOKEN }}
          TASK_PREFIX: ${{ needs.preflight.outputs.task_prefix }}
          JOB_NAME: claude
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          mkdir -p .orchestrator/proof/claude
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          from simplicio_loop.remote_queue import HTTPRemoteQueue

          job_name = os.environ["JOB_NAME"]
          queue = HTTPRemoteQueue(os.environ["QUEUE_URL"], token=os.environ["QUEUE_TOKEN"], timeout=15)
          task_id = f"{os.environ['TASK_PREFIX']}-{job_name}-identity"
          agent_id = f"{job_name}@github-actions-{os.environ['RUN_ID']}-{os.environ['RUN_ATTEMPT']}"
          identity = {
              "agent_id": agent_id,
              "runtime": job_name,
              "device_id": f"github-actions-{job_name}",
              "session_id": f"{os.environ['RUN_ID']}-{os.environ['RUN_ATTEMPT']}-{job_name}",
