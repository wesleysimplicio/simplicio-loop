          }
          out = Path(f".orchestrator/proof/{job_name}/{job_name}-identity-receipt.json")
          out.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

      - name: Upload Claude receipt
        uses: actions/upload-artifact@v4
        with:
          name: distributed-183-claude
          path: .orchestrator/proof/claude
          if-no-files-found: error

  shared-claim-fencing-proof:
    name: Shared claim and fencing proof
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Prove atomic claim and stale-fence rejection against live queue
        env:
          QUEUE_URL: ${{ needs.preflight.outputs.queue_url }}
          QUEUE_TOKEN: ${{ secrets.SIMPLICIO_REMOTE_QUEUE_TOKEN }}
          TASK_PREFIX: ${{ needs.preflight.outputs.task_prefix }}
        shell: bash
        run: |
          mkdir -p .orchestrator/proof/shared
          python3 - <<'PY'
          import json
          import multiprocessing as mp
          import os
          import time
          from pathlib import Path

          from simplicio_loop.remote_queue import HTTPRemoteQueue, QueueConflict

          queue_url = os.environ["QUEUE_URL"]
          token = os.environ["QUEUE_TOKEN"]
          prefix = os.environ["TASK_PREFIX"]
          shared_task = f"{prefix}-shared-claim"
          fenced_task = f"{prefix}-fenced-claim"
          queue = HTTPRemoteQueue(queue_url, token=token, timeout=15)
          queue.enqueue(shared_task, {"source": "github-actions", "issue": 183, "proof": "shared-claim"})
          queue.enqueue(fenced_task, {"source": "github-actions", "issue": 183, "proof": "stale-fence"})

          def worker(agent_id, barrier, result_queue):
              client = HTTPRemoteQueue(queue_url, token=token, timeout=15)
              identity = {
                  "agent_id": agent_id,
                  "runtime": "codex" if agent_id.startswith("codex") else "claude",
                  "device_id": agent_id.split("@", 1)[1],
                  "session_id": "gha-shared-proof-" + agent_id,
                  "protocol": "simplicio-distributed/v1",
                  "capabilities": ["claim", "heartbeat", "fencing", "receipts"],
              }
              try:
                  barrier.wait(timeout=10)
                  lease = client.claim(shared_task, agent_id, idempotency_key=shared_task + ":" + agent_id, ttl=20, identity=identity)
                  time.sleep(2)
                  client.complete(lease, receipt_ref=f"receipts/{shared_task}-{agent_id}.json")
                  result_queue.put({"agent_id": agent_id, "status": "claimed", "fencing_token": lease.fencing_token})
              except QueueConflict as exc:
                  result_queue.put({"agent_id": agent_id, "status": "conflict", "error": str(exc)})
              except Exception as exc:
                  result_queue.put({"agent_id": agent_id, "status": "error", "error": repr(exc)})

          ctx = mp.get_context("spawn")
          barrier = ctx.Barrier(2)
          result_queue = ctx.Queue()
          workers = [
              ctx.Process(target=worker, args=("codex@gha-shared-a", barrier, result_queue)),
              ctx.Process(target=worker, args=("claude@gha-shared-b", barrier, result_queue)),
          ]
          for proc in workers:
              proc.start()
          observed = [result_queue.get(timeout=30) for _ in workers]
          for proc in workers:
              proc.join(timeout=30)
          stale = queue.claim(fenced_task, "codex@gha-fence-a", idempotency_key=f"{fenced_task}:stale", ttl=0.1, identity={
              "agent_id": "codex@gha-fence-a",
              "runtime": "codex",
              "device_id": "gha-fence-a",
              "session_id": "gha-fence-stale",
              "protocol": "simplicio-distributed/v1",
              "capabilities": ["claim", "heartbeat", "fencing", "receipts"],
          })
          time.sleep(0.2)
          fresh = queue.claim(fenced_task, "claude@gha-fence-b", idempotency_key=f"{fenced_task}:fresh", ttl=20, identity={
              "agent_id": "claude@gha-fence-b",
              "runtime": "claude",
              "device_id": "gha-fence-b",
              "session_id": "gha-fence-fresh",
              "protocol": "simplicio-distributed/v1",
              "capabilities": ["claim", "heartbeat", "fencing", "receipts"],
          })
          stale_rejected = False
          stale_error = ""
          try:
              queue.complete(stale, receipt_ref=f"receipts/{fenced_task}-stale.json")
          except QueueConflict as exc:
              stale_rejected = True
              stale_error = str(exc)
          fresh_completion = queue.complete(fresh, receipt_ref=f"receipts/{fenced_task}-fresh.json")
          events = [row for row in queue.events(after=0, limit=400) if row["task_id"] in {shared_task, fenced_task}]
          payload = {
              "schema": "simplicio.distributed-proof.shared-claim-fencing/v1",
              "tag": "MEASURED" if stale_rejected else "UNVERIFIED",
              "issue": 183,
              "queue_url": queue_url,
              "shared_task": shared_task,
              "fenced_task": fenced_task,
              "observed": observed,
              "stale_rejected": stale_rejected,
              "stale_error": stale_error,
              "fresh_completion": fresh_completion,
              "events": events,
              "physical_machine_status": "UNVERIFIED",
          }
          Path(".orchestrator/proof/shared/shared-claim-fencing.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          if not stale_rejected:
              raise SystemExit(1)
          PY

      - name: Upload shared proof
        uses: actions/upload-artifact@v4
        with:
          name: distributed-183-shared
          path: .orchestrator/proof/shared
          if-no-files-found: error

  local-boundary-receipt:
    name: Local boundary receipt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate issue-183 local boundary receipt
        shell: bash
        run: |
          mkdir -p .orchestrator/proof/local-boundary
          python3 scripts/execution_board_e2e.py --out .orchestrator/proof/local-boundary

      - name: Upload local boundary receipt
        uses: actions/upload-artifact@v4
        with:
          name: distributed-183-local-boundary
          path: .orchestrator/proof/local-boundary
          if-no-files-found: error

  summary:
    name: Summarize distributed proof
    needs:
      - preflight
      - codex-identity-proof
      - claude-identity-proof
      - shared-claim-fencing-proof
      - local-boundary-receipt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Aggregate verifiable receipts
        shell: bash
        run: |
          mkdir -p .orchestrator/proof/summary
          python3 - <<'PY'
          import json
          from pathlib import Path

          def load_one(pattern):
              matches = list(Path("artifacts").glob(pattern))
              if len(matches) != 1:
                  raise SystemExit(f"expected exactly one artifact for {pattern}, found {len(matches)}")
              return json.loads(matches[0].read_text(encoding="utf-8"))

          preflight = load_one("distributed-183-preflight/preflight.json")
          codex = load_one("distributed-183-codex/codex-identity-receipt.json")
          claude = load_one("distributed-183-claude/claude-identity-receipt.json")
          shared = load_one("distributed-183-shared/shared-claim-fencing.json")
          local_boundary = load_one("distributed-183-local-boundary/distributed-epic-evidence.json")

          payload = {
              "schema": "simplicio.distributed-proof.summary/v1",
              "issue": 183,
              "tag": "MEASURED",
              "queue_url": preflight["queue_url"],
              "tls_sha256_measured": preflight["tls_sha256_measured"],
              "proofs": {
                  "preflight": preflight,
                  "codex_identity": codex,
                  "claude_identity": claude,
                  "shared_claim_fencing": shared,
                  "local_boundary": local_boundary,
              },
              "measured_status": {
                  "endpoint_tls_secret_gate": preflight["tag"],
                  "codex_identity_receipt": codex["tag"],
                  "claude_identity_receipt": claude["tag"],
                  "shared_claim_fencing": shared["tag"],
                  "local_boundary_receipt": local_boundary["tag"],
              },
              "unverified_boundaries": {
                  "physical_machine_independence": "UNVERIFIED",
                  "production_firewall_policy": "UNVERIFIED",
                  "merge_queue_delivery": "UNVERIFIED",
              },
              "notes": [
                  "Independent GitHub jobs prove runtime-specific receipts against one HTTPS queue endpoint.",
                  "This workflow does not prove Codex and Claude ran on physically independent machines.",
                  "Deployment-level absence fails closed in preflight instead of being silently downgraded to local proof.",
              ],
          }
          out = Path(".orchestrator/proof/summary/distributed-183-summary.json")
          out.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: distributed-183-summary
          path: .orchestrator/proof/summary
          if-no-files-found: error
