# simplicio-loop — CI gate (claims-audit + worker selftests/smoke).
# Runs scripts/check.py on every push/PR to main so a broken claim or a regressed worker can't
# land silently — the gate already exists locally (`python3 scripts/check.py`) but nothing ran
# it automatically before this workflow.
#
# Matrix + tag gate (#71): the repo claims cross-platform / stdlib-only ("runs on bare python3"),
# a Windows install path (scripts/install.ps1), and no minimum Python beyond `requires-python` in
# pyproject.toml — none of that was exercised in CI before. The full OS x Python matrix runs on
# every push/PR; a release (tag push) additionally builds, validates, and installs the wheel (a
# clean-venv smoke import), since the wheel's content depends on `simplicio_loop/_bundle/` parity
# (see the bundle-parity check) and a broken `[tool.setuptools.package-data]` glob would only
# surface at install time, never at build time.
#
# #120 — this workflow IS the "run scripts/check.py in CI" gate the issue asked for (kept the
# existing `ci.yml` name instead of adding a second, duplicate `check.yml` — running the same gate
# twice per push/PR would double the OS x Python matrix minutes for no benefit; see the PR body).
#
# Optional toolchains (Node 22, FFmpeg, Playwright) are deliberately NOT installed here: no test in
# `scripts/check.py`'s suite requires them to exercise its logic — `video_evidence.py`,
# `web_verify.py`, etc. already have selftests that assert they BLOCK (never fake-pass) when their
# toolchain is missing, and that fail-closed behavior is exactly what this CI matrix exercises. Add
# a toolchain here only if a future test needs to prove the toolchain-PRESENT path.
#
# Cost controls: pip is cached per (OS, Python) cell via actions/setup-python's built-in cache, and
# the concurrency group below cancels a PR's superseded runs so pushing twice in a row doesn't burn
# double the matrix.

name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: scripts/check.py (claims-audit + worker selftests/smoke)
        run: python3 scripts/check.py

  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"
      - name: Install build tooling
        run: python3 -m pip install --upgrade build twine
      - name: Build sdist + wheel
        run: python3 -m build
      - name: Validate distribution metadata
        run: python3 -m twine check dist/*
      - name: Wheel install smoke test
        run: |
          python3 -m venv /tmp/wheel-smoke-venv
          /tmp/wheel-smoke-venv/bin/python -m pip install --upgrade pip
          /tmp/wheel-smoke-venv/bin/python -m pip install dist/*.whl
          /tmp/wheel-smoke-venv/bin/python -c "import simplicio_loop; print(simplicio_loop.__file__)"
          /tmp/wheel-smoke-venv/bin/simplicio-loop --help
