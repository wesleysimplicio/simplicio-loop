name: Windows progress smoke

on:
  pull_request:
    paths:
      - "simplicio_loop/progress.py"
      - "tests/test_progress_unit.py"
      - ".github/workflows/windows-progress-smoke.yml"
  workflow_dispatch:

jobs:
  progress:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        shell: pwsh
        run: python -m pip install -e .
      - name: Run progress smoke and record receipt
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "progress-smoke.log"
          $command = "python -m pytest tests/test_progress_unit.py tests/test_progress_e2e_system.py -q"
          & python -m pytest tests/test_progress_unit.py tests/test_progress_e2e_system.py -q 2>&1 | Tee-Object -FilePath $log
          $exitCode = $LASTEXITCODE
          Write-Host "command=$command"
          Write-Host "exit_code=$exitCode"
          Write-Host "tail:"
          Get-Content $log -Tail 30
          if ($exitCode -ne 0) { exit $exitCode }