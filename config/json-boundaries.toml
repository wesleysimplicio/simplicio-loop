version = 1
policy = "internal-json-deny"

[scanner]
internal_roots = [".orchestrator", ".simplicio"]
formats = [".json", ".jsonl", ".ndjson"]

[[exceptions]]
path = ".orchestrator/savings/snapshots.jsonl"
category = "legacy-internal"
target = "hbp"
owner = "loop"
reason = "migrate append-only savings snapshots to Runtime HBP v1"
expires = "2026-09-30"
