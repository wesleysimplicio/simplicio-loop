<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
<title id="title">simplicio-loop architecture planes</title><desc id="desc">Sources become contracts, pass through the control plane, parallel execution, evidence, and verified delivery.</desc>
<defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#06111f"/><stop offset="1" stop-color="#0d2638"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#22d3ee"/></marker></defs><rect width="1600" height="760" rx="34" fill="url(#bg)"/>
<g font-family="Inter,Segoe UI,sans-serif" fill="#e9fbff"><text x="80" y="70" font-size="34" font-weight="700">simplicio-loop · four coordinated planes</text><text x="80" y="105" font-size="18" fill="#92ccda">The model decides; deterministic workers survey, operate, verify, record, and recover.</text>
<g font-size="20" font-weight="700"><rect x="70" y="150" width="1460" height="115" rx="24" fill="#0b2b3b" stroke="#22d3ee"/><text x="100" y="188" fill="#62e7f5">01 · INTENT + CONTRACT PLANE</text><text x="100" y="228" font-size="17" font-weight="400">GitHub · Jira · CI · local queue → source state → frozen acceptance criteria → dependency DAG → completion oracle</text></g>
<path d="M800 267V305" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
<g><rect x="70" y="315" width="1460" height="145" rx="24" fill="#0d303d" stroke="#14b8a6"/><text x="100" y="355" font-size="20" font-weight="700" fill="#5eead4">02 · CONTROL PLANE</text><g font-size="16" text-anchor="middle"><rect x="105" y="380" width="250" height="50" rx="16" fill="#123d49"/><text x="230" y="411">hierarchical planner</text><rect x="390" y="380" width="250" height="50" rx="16" fill="#123d49"/><text x="515" y="411">backlog + scheduler</text><rect x="675" y="380" width="250" height="50" rx="16" fill="#123d49"/><text x="800" y="411">mapper + context pack</text><rect x="960" y="380" width="250" height="50" rx="16" fill="#123d49"/><text x="1085" y="411">worktree queue</text><rect x="1245" y="380" width="250" height="50" rx="16" fill="#123d49"/><text x="1370" y="411">ops ledger + runtime</text></g></g>
<path d="M800 462V500" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
<g><rect x="70" y="510" width="900" height="175" rx="24" fill="#0b2938" stroke="#3b82f6"/><text x="100" y="550" font-size="20" font-weight="700" fill="#75a7ff">03 · PARALLEL EXECUTION PLANE</text><g font-size="16" text-anchor="middle"><rect x="105" y="580" width="125" height="65" rx="14" fill="#12344b"/><text x="167" y="607">lane A</text><text x="167" y="629" fill="#9dc4db">worktree</text><rect x="250" y="580" width="125" height="65" rx="14" fill="#12344b"/><text x="312" y="607">lane B</text><text x="312" y="629" fill="#9dc4db">worktree</text><rect x="395" y="580" width="125" height="65" rx="14" fill="#12344b"/><text x="457" y="607">lane C</text><text x="457" y="629" fill="#9dc4db">worktree</text><rect x="540" y="580" width="125" height="65" rx="14" fill="#12344b"/><text x="602" y="607">lane D</text><text x="602" y="629" fill="#9dc4db">worktree</text><rect x="685" y="580" width="125" height="65" rx="14" fill="#12344b"/><text x="747" y="607">lane E</text><text x="747" y="629" fill="#9dc4db">worktree</text><rect x="830" y="580" width="105" height="65" rx="14" fill="#12344b"/><text x="882" y="607">lane …</text><text x="882" y="629" fill="#9dc4db">bounded</text></g></g>
<g><rect x="1000" y="510" width="530" height="175" rx="24" fill="#2b2515" stroke="#f5b942"/><text x="1030" y="550" font-size="20" font-weight="700" fill="#f7d27c">04 · EVIDENCE + DELIVERY PLANE</text><text x="1030" y="590" font-size="16">tests · impact · flow · watcher challenge</text><text x="1030" y="620" font-size="16">receipts · HBP chain · checkpoint · rollback</text><text x="1030" y="650" font-size="16">merge → source re-query → dry rounds → durable memory</text></g></g></svg>
